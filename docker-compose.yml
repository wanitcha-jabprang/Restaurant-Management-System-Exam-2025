services:
  db:
    image: postgres:16-alpine
    container_name: rms-db
    restart: unless-stopped
    platform: linux/amd64
    environment:
      POSTGRES_DB: rms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rms-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://postgres:postgres@db:5432/rms_db  #
      JWT_SECRET: ${JWT_SECRET:-rms-dev-secret-change-in-prod}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "3001:3001"
    depends_on:
      - db  

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: rms-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend 

volumes:
  postgres_data: