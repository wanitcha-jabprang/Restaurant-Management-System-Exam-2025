services:
  - type: pserv
    name: rms-backend
    env: docker
    buildCommand: docker build -t rms-backend ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false # Set in Render dashboard or via secrets
      - key: JWT_SECRET
        sync: false # Set in Render dashboard
      - key: CORS_ORIGIN
        value: https://restaurant-management-s-git-26e209-wanitcha-jabprang-s-projects.vercel.app,http://localhost:5173
        sync: false # Multiple origins separated by comma
    healthCheckPath: /api/health
    disk:
      name: prisma-cache
      mountPath: /app/prisma
      sizeGB: 1
