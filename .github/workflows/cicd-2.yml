name: RMS CI/CD Pipeline

# ===================================================
# ส่วนที่ 1: Trigger — ทำงานอัตโนมัติเมื่อมีการ push/PR ไปที่ main
# ===================================================
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # รันด้วยมือได้จาก GitHub UI

# ===================================================
# Environment Variables ระดับ Global
# ===================================================
env:
  NODE_VERSION: "24" # 👈 [อัปเดต 2026] ยกระดับรองรับมาตรฐานใหม่ของ GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────
  # JOB 1: Security Scan (npm audit)
  # ─────────────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan (npm audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ── Backend Security Scan ──
      - name: Install Backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run npm audit — Backend (fail on HIGH+)
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Save Backend audit report
        if: always()
        working-directory: backend
        run: |
          npm audit --json > ../audit-backend.json || true
          npm audit > ../audit-backend.txt || true

      # ── Frontend Security Scan ──
      - name: Install Frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run npm audit — Frontend (fail on HIGH+)
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Save Frontend audit report
        if: always()
        working-directory: frontend
        run: |
          npm audit --json > ../audit-frontend.json || true
          npm audit > ../audit-frontend.txt || true

      - name: Upload Security Audit Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-reports
          path: |
            audit-backend.json
            audit-backend.txt
            audit-frontend.json
            audit-frontend.txt
          retention-days: 30

  # ─────────────────────────────────────────────────
  # JOB 2: Backend Unit & Integration Tests (Vitest)
  # ─────────────────────────────────────────────────
  backend-test:
    name: 🧪 Backend Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_POOL }}
          DIRECT_URL: ${{ secrets.DATABASE_URL_DIRECT }}

      - name: Run Unit Tests (Vitest)
        working-directory: backend
        run: npm run test -- --reporter=verbose --coverage
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_POOL }}
          DIRECT_URL: ${{ secrets.DATABASE_URL_DIRECT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: test

      - name: Upload Test Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 14

  # ─────────────────────────────────────────────────
  # JOB 3: Deploy Backend → Render.com
  # ─────────────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Trigger Render Deploy Hook
        run: |
          echo "📦 Triggering Render deployment..."
          curl --silent --show-error --fail \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o render_deploy_response.json
          echo "✅ Render deploy hook triggered"
          cat render_deploy_response.json

      - name: Wait for Render deployment to complete
        run: |
          echo "⏳ Waiting 3 minutes for Render to deploy..."
          sleep 180

      - name: Verify Backend is alive (Health Check)
        run: |
          echo "🔍 Checking backend health..."
          
          TARGET_URL="${{ secrets.RENDER_BACKEND_URL }}"
          if [ -z "$TARGET_URL" ]; then
            TARGET_URL="${{ secrets.BACKEND_URL }}"
          fi
          if [ -z "$TARGET_URL" ]; then
            TARGET_URL="https://rms-backend-47sv.onrender.com"
          fi
          
          for i in {1..10}; do
            HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              "$TARGET_URL/api/health")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Backend is up! (HTTP $HTTP_STATUS)"
              exit 0
            fi
            echo "⏳ Attempt $i/10 — HTTP $HTTP_STATUS, retrying in 30s..."
            sleep 30
          done
          echo "❌ Backend health check failed after 10 attempts"
          exit 1

  # ─────────────────────────────────────────────────
  # JOB 4: Deploy Frontend → Vercel
  # ─────────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        working-directory: frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Frontend (Production)
        working-directory: frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_API_URL: ${{ secrets.RENDER_BACKEND_URL }}

      - name: Deploy to Vercel Production
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ─────────────────────────────────────────────────
  # JOB 5: E2E API Tests (Newman)
  # ─────────────────────────────────────────────────
  newman-e2e-test:
    name: 🔁 E2E API Tests (Newman)
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Newman and HTML reporter
        run: npm install --global newman newman-reporter-htmlextra

      - name: Create Newman environment file
        run: |
          mkdir -p tests/postman
          cat > tests/postman/env.json << EOF
          {
            "id": "rms-ci-env",
            "name": "RMS Production Environment",
            "values": [
              { "key": "base_url", "value": "${{ secrets.RENDER_BACKEND_URL }}", "enabled": true },
              { "key": "frontend_url", "value": "https://restaurant-management-system-exam-2025-g1p8fekqo.vercel.app", "enabled": true },
              { "key": "admin_username", "value": "admin", "enabled": true },
              { "key": "admin_password", "value": "${{ secrets.ADMIN_PASSWORD }}", "enabled": true },
              { "key": "token", "value": "", "enabled": true },
              { "key": "admin_token", "value": "", "enabled": true }
            ]
          }
          EOF

      - name: Run Newman E2E Tests
        id: newman
        run: |
          mkdir -p tests/reports
          newman run tests/postman/RMS-TestSuite.json \
            --environment tests/postman/env.json \
            --reporters cli,htmlextra,json \
            --reporter-htmlextra-export tests/reports/newman-report.html \
            --reporter-json-export tests/reports/newman-report.json \
            --bail failure \
            --color on
        continue-on-error: true

      - name: Parse Newman Results and Set Pass Rate
        if: always()
        run: |
          if [ -f tests/reports/newman-report.json ]; then
            TOTAL=$(jq '.run.stats.assertions.total' tests/reports/newman-report.json)
            FAILED=$(jq '.run.stats.assertions.failed' tests/reports/newman-report.json)
            PASSED=$((TOTAL - FAILED))
            RATE=$(echo "scale=1; $PASSED * 100 / $TOTAL" | bc)
            echo "📊 Newman Results: $PASSED/$TOTAL passed ($RATE%)"
            
            if (( $(echo "$RATE < 80" | bc -l) )); then
              echo "❌ Pass rate $RATE% is below 80% threshold"
              exit 1
            fi
            echo "✅ Pass rate $RATE% meets threshold"
          fi

      - name: Upload Newman Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-e2e-reports
          path: tests/reports/
          retention-days: 30

  # ─────────────────────────────────────────────────
  # JOB 6: Smoke Test (Production)
  # ─────────────────────────────────────────────────
  smoke-test:
    name: 🚬 Smoke Test (Production)
    runs-on: ubuntu-latest
    needs: newman-e2e-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # ── Smoke Test 1: Backend Health Check ──
      - name: "[ST-01] Backend Health Check"
        id: smoke_health
        run: |
          TARGET_URL="${{ secrets.RENDER_BACKEND_URL }}"
          if [ -z "$TARGET_URL" ]; then TARGET_URL="${{ secrets.BACKEND_URL }}"; fi
          if [ -z "$TARGET_URL" ]; then TARGET_URL="https://rms-backend-47sv.onrender.com"; fi
          
          echo "🔍 Testing: GET $TARGET_URL/api/health"
          RESPONSE=$(curl --silent --fail "$TARGET_URL/api/health")
          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          if [ "$STATUS" = "ok" ]; then
            echo "✅ PASS — Health Check: $RESPONSE"
          else
            echo "❌ FAIL — Unexpected response: $RESPONSE"
            exit 1
          fi

      # ── Smoke Test 2: Admin Login ──
      - name: "[ST-02] Admin Login via API"
        id: smoke_login
        run: |
          TARGET_URL="${{ secrets.RENDER_BACKEND_URL }}"
          if [ -z "$TARGET_URL" ]; then TARGET_URL="${{ secrets.BACKEND_URL }}"; fi
          if [ -z "$TARGET_URL" ]; then TARGET_URL="https://rms-backend-47sv.onrender.com"; fi
          
          echo "🔍 Testing: POST $TARGET_URL/api/auth/login"
          RESPONSE=$(curl --silent --fail \
            -X POST "$TARGET_URL/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"admin\", \"password\": \"Admin@123\"}")
          TOKEN=$(echo "$RESPONSE" | jq -r '.token // .accessToken // empty')
          if [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ]; then
            echo "✅ PASS — Admin login successful, JWT received"
            echo "SMOKE_TOKEN=$TOKEN" >> $GITHUB_ENV
          else
            echo "❌ FAIL — No JWT token in response: $RESPONSE"
            exit 1
          fi

      # ── Smoke Test 3: Open Table & Create Order ──
      - name: "[ST-03] Open Table and Create Order"
        id: smoke_order
        run: |
          TARGET_URL="${{ secrets.RENDER_BACKEND_URL }}"
          if [ -z "$TARGET_URL" ]; then TARGET_URL="${{ secrets.BACKEND_URL }}"; fi
          if [ -z "$TARGET_URL" ]; then TARGET_URL="https://rms-backend-47sv.onrender.com"; fi
          
          echo "🔍 Testing: POST $TARGET_URL/api/orders"
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            -X POST "$TARGET_URL/api/orders" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ env.SMOKE_TOKEN }}" \
            -d '{"tableNumber": 99, "items": []}')
          if [[ "$HTTP_STATUS" =~ ^(200|201|400)$ ]]; then
            echo "✅ PASS — Order endpoint responsive (HTTP $HTTP_STATUS)"
          else
            echo "❌ FAIL — Unexpected HTTP $HTTP_STATUS"
            exit 1
          fi

      # ── Smoke Test 4: Payment Endpoint ──
      - name: "[ST-04] Payment Endpoint Responsive"
        id: smoke_payment
        run: |
          TARGET_URL="${{ secrets.RENDER_BACKEND_URL }}"
          if [ -z "$TARGET_URL" ]; then TARGET_URL="${{ secrets.BACKEND_URL }}"; fi
          if [ -z "$TARGET_URL" ]; then TARGET_URL="https://rms-backend-47sv.onrender.com"; fi
          
          echo "🔍 Testing: Payment endpoint exists and is reachable"
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            -X POST "$TARGET_URL/api/payments" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ env.SMOKE_TOKEN }}" \
            -d '{"orderId": "nonexistent-test"}')
          if [[ "$HTTP_STATUS" =~ ^(400|404|422|200)$ ]]; then
            echo "✅ PASS — Payment endpoint responsive (HTTP $HTTP_STATUS)"
          else
            echo "❌ FAIL — HTTP $HTTP_STATUS"
            exit 1
          fi

      # ── Smoke Test 5: Frontend Reachable ──
      - name: "[ST-05] Frontend Accessible (Vercel)"
        id: smoke_frontend
        run: |
          # 💡 [แก้ไขสำเร็จ] วิ่งตรงไปยัง Vercel URL ที่ส่งมา ล็อกเป้าหมายแม่นยำ
          TARGET_FRONTEND="https://restaurant-management-system-exam-2025-g1p8fekqo.vercel.app"
          
          echo "🔍 Testing: GET $TARGET_FRONTEND"
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --max-time 30 "$TARGET_FRONTEND")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ PASS — Frontend is accessible (HTTP $HTTP_STATUS)"
          else
            echo "❌ FAIL — Frontend returned HTTP $HTTP_STATUS"
            exit 1
          fi

      # ── Smoke Test 6: Security — Reject Unauthenticated Request ──
      - name: "[ST-06] Security — Reject request without JWT"
        id: smoke_security
        run: |
          TARGET_URL="${{ secrets.RENDER_BACKEND_URL }}"
          if [ -z "$TARGET_URL" ]; then TARGET_URL="${{ secrets.BACKEND_URL }}"; fi
          if [ -z "$TARGET_URL" ]; then TARGET_URL="https://rms-backend-47sv.onrender.com"; fi
          
          echo "🔍 Testing: Protected endpoint must reject unauthenticated request"
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            "$TARGET_URL/api/orders")
          if [ "$HTTP_STATUS" = "401" ]; then
            echo "✅ PASS — Unauthenticated request rejected with HTTP 401"
          else
            echo "❌ FAIL — Expected 401 but got HTTP $HTTP_STATUS"
            exit 1
          fi

      # ── Summary ──
      - name: Smoke Test Summary
        if: always()
        run: |
          TARGET_URL="${{ secrets.RENDER_BACKEND_URL }}"
          if [ -z "$TARGET_URL" ]; then TARGET_URL="${{ secrets.BACKEND_URL }}"; fi
          if [ -z "$TARGET_URL" ]; then TARGET_URL="https://rms-backend-47sv.onrender.com"; fi
          
          echo ""
          echo "════════════════════════════════════════"
          echo "    🚬 SMOKE TEST SUMMARY"
          echo "════════════════════════════════════════"
          echo "ST-01 Health Check     : ${{ steps.smoke_health.outcome == 'success' && '✅ PASS' || '❌ FAIL' }}"
          echo "ST-02 Admin Login      : ${{ steps.smoke_login.outcome == 'success' && '✅ PASS' || '❌ FAIL' }}"
          echo "ST-03 Create Order     : ${{ steps.smoke_order.outcome == 'success' && '✅ PASS' || '❌ FAIL' }}"
          echo "ST-04 Payment Endpoint : ${{ steps.smoke_payment.outcome == 'success' && '✅ PASS' || '❌ FAIL' }}"
          echo "ST-05 Frontend Access  : ${{ steps.smoke_frontend.outcome == 'success' && '✅ PASS' || '❌ FAIL' }}"
          echo "ST-06 Auth Security    : ${{ steps.smoke_security.outcome == 'success' && '✅ PASS' || '❌ FAIL' }}"
          echo "════════════════════════════════════════"
          echo "Backend  : $TARGET_URL"
          echo "Frontend : https://restaurant-management-system-exam-2025-g1p8fekqo.vercel.app"
          echo "════════════════════════════════════════"