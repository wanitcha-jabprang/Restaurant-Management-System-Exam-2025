name: RMS Newman Test Only Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # เปิดให้กดรันด้วยมือจากหน้า GitHub UI ได้

env:
  NODE_VERSION: "22"

jobs:
  # ─────────────────────────────────────────────────
  # JOB : E2E API Tests (Newman)
  # ─────────────────────────────────────────────────
  newman-e2e-test:
    name: 🔁 E2E API Tests (Newman)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Newman and HTML reporter
        run: npm install --global newman newman-reporter-htmlextra

      - name: Create Newman environment file
        # สร้าง env.json แบบ dynamic จาก GitHub Secrets
        run: |
          cat > tests/postman/env.json << EOF
          {
            "id": "rms-ci-env",
            "name": "RMS Production Environment",
            "values": [
              {
                "key": "base_url",
                "value": "${{ secrets.BACKEND_URL }}",
                "enabled": true
              },
              {
                "key": "frontend_url",
                "value": "${{ secrets.FRONTEND_URL }}",
                "enabled": true
              },
              {
                "key": "admin_username",
                "value": "admin",
                "enabled": true
              },
              {
                "key": "admin_password",
                "value": "${{ secrets.ADMIN_PASSWORD }}",
                "enabled": true
              },
              {
                "key": "token",
                "value": "",
                "enabled": true
              },
              {
                "key": "admin_token",
                "value": "",
                "enabled": true
              }
            ]
          }
          EOF

      - name: Run Newman E2E Tests
        id: newman
        run: |
          mkdir -p tests/reports
          newman run tests/postman/RMS-[68030251]-TestSuite.json \
            --environment tests/postman/env.json \
            --reporters cli,htmlextra,json \
            --reporter-htmlextra-export tests/reports/newman-report.html \
            --reporter-json-export tests/reports/newman-report.json \
            --bail failure \
            --color on
        continue-on-error: true # บันทึก report แม้บาง test จะ fail

      - name: Parse Newman Results and Set Pass Rate
        if: always()
        run: |
          if [ -f tests/reports/newman-report.json ]; then
            TOTAL=$(jq '.run.stats.assertions.total' tests/reports/newman-report.json)
            FAILED=$(jq '.run.stats.assertions.failed' tests/reports/newman-report.json)
            PASSED=$((TOTAL - FAILED))
            RATE=$(echo "scale=1; $PASSED * 100 / $TOTAL" | bc)
            echo "📊 Newman Results: $PASSED/$TOTAL passed ($RATE%)"
            echo "NEWMAN_PASS_RATE=$RATE" >> $GITHUB_ENV
            echo "NEWMAN_PASSED=$PASSED" >> $GITHUB_ENV
            echo "NEWMAN_TOTAL=$TOTAL" >> $GITHUB_ENV
            echo "NEWMAN_FAILED=$FAILED" >> $GITHUB_ENV

            # Fail pipeline หาก pass rate ต่ำกว่า 80%
            if (( $(echo "$RATE < 80" | bc -l) )); then
              echo "❌ Pass rate $RATE% is below 80% threshold"
              exit 1
            fi
            echo "✅ Pass rate $RATE% meets threshold"
          fi

      - name: Upload Newman Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-e2e-reports
          path: tests/reports/
          retention-days: 30